trigger:
  branches:
    include:
      - main
  paths:
    include:
      # Adjusted to match the folder structure where Dockerfile lives
      - ari-capstone-project/capstone-ui/**

pool:
  vmImage: ubuntu-latest

variables:
  azureSubscription: 'Ari-capstone-training'
  webAppName: 'app-capstone-ui-dev-ari123'
  acrName: 'acrcapstoneari123' 
  imageRepository: 'frontend'
  # ACTION REQUIRED: Update this with your actual Azure DevOps Service Connection name for ACR
  dockerRegistryServiceConnection: 'Your_ACR_Service_Connection_Name' 

stages:
- stage: DEV
  displayName: DEV - Frontend
  jobs:
  - job: FrontendDEV
    displayName: Deploy Frontend DEV
    steps:
    - checkout: self

    # 1. Build and Push Docker Image (Contains Nginx + React Build)
    - task: Docker@2
      displayName: Build and Push to ACR
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        # Assumes the Dockerfile is inside the capstone-ui folder
        dockerfile: '$(Build.SourcesDirectory)/ari-capstone-project/capstone-ui/Dockerfile'
        buildContext: '$(Build.SourcesDirectory)/ari-capstone-project/capstone-ui'
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          latest
          $(Build.BuildId)

    # 2. Deploy Container to Azure Web App
    - task: AzureWebApp@1
      displayName: Deploy UI Container
      inputs:
        azureSubscription: $(azureSubscription)
        appName: $(webAppName)
        # Tells Azure to pull the image we just pushed
        containers: '$(acrName).azurecr.io/$(imageRepository):latest'